<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MakerNav - Projetos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/lab.css" />
    <link rel="stylesheet" href="css/footer.css" />
</head>

<body class="lab-body">

    <nav class="nav nav-lab">
        <a href="/" class="nav-logo">
            <span class="nav-logo-text">MakerNav</span>
        </a>
        <div class="cat-tabs" role="tablist">
            <button class="cat-tab active" data-cat="Todos">Todos</button>
            <button class="cat-tab" data-cat="Web">Web</button>
            <button class="cat-tab" data-cat="Mobile">Mobile</button>
            <button class="cat-tab" data-cat="Embarcados">Embarcados</button>
        </div>
        <div class="nav-search">
            <input id="search-input" type="text" placeholder="Buscar projeto..." aria-label="Buscar projeto" />
        </div>
        <a href="/" class="nav-cta nav-cta-ghost">Voltar</a>
    </nav>

    <main class="page-wrap">
        <div class="toolbar">
            <div class="toolbar-left">
                <h1 class="toolbar-title" id="toolbar-title">Projetos</h1>
                <span class="count-badge" id="count-badge">0 projetos</span>
            </div>
            <div class="toolbar-right">
                <div class="view-switch">
                    <button class="view-btn active" id="btn-grid" title="Grade" aria-label="Visualização em grade">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                        </svg>
                    </button>
                    <button class="view-btn" id="btn-table" title="Tabela" aria-label="Visualização em tabela">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6" />
                            <line x1="8" y1="12" x2="21" y2="12" />
                            <line x1="8" y1="18" x2="21" y2="18" />
                            <line x1="3" y1="6" x2="3.01" y2="6" />
                            <line x1="3" y1="12" x2="3.01" y2="12" />
                            <line x1="3" y1="18" x2="3.01" y2="18" />
                        </svg>
                    </button>
                </div>
                <button class="btn-primary" id="btn-open-project">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Novo Projeto
                </button>
            </div>
        </div>
        <section id="items-grid" aria-live="polite"></section>
        <section id="items-table" hidden>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Descrição</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

    <footer class="footer footer-compact">
        <span>© 2026 MakerNav - Laboratório Maker Escolar</span>
        <span class="footer-tech">Java · Spring Boot</span>
    </footer>

    <div class="overlay" id="project-overlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="project-modal-title">
            <header class="modal-header">
                <h2 class="modal-title" id="project-modal-title">Novo Projeto</h2>
                <button class="modal-close" id="close-project-modal" aria-label="Fechar modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </header>

            <div class="modal-body">
                <form id="form-project" novalidate>
                    <div class="form-field">
                        <label for="p-name">Nome do Projeto</label>
                        <input type="text" id="p-name" placeholder="Ex: API de Pagamentos" required minlength="5" />
                        <small id="err-p-name" role="alert" aria-live="polite" hidden></small>
                    </div>

                    <div class="form-field">
                        <label for="p-cat">Categoria</label>
                        <select id="p-cat" required>
                            <option value="">Selecione...</option>
                            <option value="Web">Web</option>
                            <option value="Mobile">Mobile</option>
                            <option value="Desktop">Desktop</option>
                            <option value="Embarcados">Embarcados</option>
                        </select>
                        <small id="err-p-cat" role="alert" aria-live="polite" hidden></small>
                    </div>

                    <div class="form-field">
                        <label for="p-desc">Descrição</label>
                        <textarea id="p-desc" rows="4" placeholder="Descreva o objetivo deste projeto..."
                            required></textarea>
                        <small id="err-p-desc" role="alert" aria-live="polite" hidden></small>
                    </div>
                </form>
            </div>

            <footer class="modal-footer">
                <button class="btn-ghost" id="btn-cancel-project">Cancelar</button>
                <button class="btn-primary" id="btn-save-project">Salvar</button>
            </footer>
        </div>
    </div>

    <div class="overlay" id="del-overlay" aria-hidden="true">
        <div class="modal modal-confirm" role="alertdialog" aria-modal="true">
            <div class="confirm-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
            </div>
            <h3 class="confirm-title">Deletar projeto?</h3>
            <p class="confirm-sub">Tem certeza de que deseja deletar <span id="del-item-name"
                    class="confirm-name"></span>?
                Esta ação não pode ser desfeita.</p>
            <div class="confirm-actions">
                <button class="btn-ghost" id="cancel-del">Cancelar</button>
                <button class="btn-danger" id="confirm-del">Deletar</button>
            </div>
        </div>
    </div>

    <div class="toast-wrap" id="toast-wrap" aria-live="polite"></div>

    <script type="module" src="js/projetos.js"></script>
</body>

</html>
