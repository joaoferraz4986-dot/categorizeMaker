<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <meta name="description"
        content="Sistema de gestão para laboratórios maker escolares: organize ferramentas, componentes e utilitários." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/registro.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <section class="container-cad-log"> <!--cad = cadastro-->
        <div class="bloqueio">
            <div class="bloqueio-formas"></div>
        </div>

        <div class="container-cadastro">
            <div class="cad">
                <div class="cad-header">
                    <h2 class="cad-text">Seja bem-vindo!</h2>
                    <span class="cad-sub-text">Crie sua conta inserindo seus dados abaixo.</span>
                </div>
                <hr class="divisor">
                <form action="" class="cad-inner">
                    <input type="text" id="cadastro-nome" name="nome" required placeholder="Nome">

                    <input type="email" id="cadastro-email" name="email" required placeholder="E-mail">

                    <input type="password" id="cadastro-senha" name="senha" required placeholder="Senha">

                    <!-- CARGO PODE NÃO TER FUNÇÃO ATUALMENTE -->
                    <select id="cadastro-cargo" name="cargo" required>
                        <option value="" disabled selected>Selecione o cargo</option>
                        <option value="PROFESSOR">Professor</option>
                        <option value="ALUNO">Aluno</option>
                    </select>

                    <button type="submit" class="cad-btn">Cadastrar</button>
                </form>
                <div class="cad-bottom">
                    <span class="troca-do-cad">Já tem uma conta? <a href="login.html" id="troca-log">Entre
                            aqui</a></span>
                </div>
            </div>
        </div>
    </section>

    <script src="js/formas.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cad/log/cadastro.js" type="module"></script>
</body>

</html>
